services:
  frontend:

    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
    networks:
      - rishu-app_network
    user: node

  web:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - frontend
      - syllabus-backend
    ports:
      - 80:80
    environment:
      - SERVER_NAME=${SERVER_NAME}
    networks:
      - rishu-app_network

  syllabus-backend:
    build:
      context: ./syllabus-backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - syllabus-db
    ports:
      - 8080:8080
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - rishu-app_network

  syllabus-db:
    image: postgres:17.4-bullseye
    volumes:
      - syllabus-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - rishu-app_network

  syllabus-scrape:
    build:
      context: ./syllabus-scrape
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - syllabus-scrape-redis
      - syllabus-backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NODE_ENV: production
      SYLLABUS_BACKEND_URL: http://syllabus-backend:8080
      REDIS_HOST: syllabus-scrape-redis
      REDIS_PORT: 6379
    networks:
      - rishu-app_network

  syllabus-scrape-redis:
    image: redis:8.0-alpine
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - rishu-app_network

volumes:
  syllabus-db:
  redis-data:


networks:
  rishu-app_network:
    driver: bridge
